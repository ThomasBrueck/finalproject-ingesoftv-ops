apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-dashboard-service
  namespace: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: circleguard-dashboard-service
  template:
    metadata:
      labels:
        app: circleguard-dashboard-service
    spec:
      # Sin service links: K8s inyecta env vars <SERVICE>_PORT=tcp://... por cada
      # Service del namespace (p.ej. LOGSTASH_PORT) que colisionan con la
      # configuracion de la app (logback, Spring relaxed binding).
      enableServiceLinks: false
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-dashboard-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-dashboard-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8084
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8084
          initialDelaySeconds: 90
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          tcpSocket:
            port: 8084
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 5
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        # dashboard-service llama a promotion vía REST; sin esta URL caía al
        # default http://localhost:8088 (a sí mismo) → Connection refused y el
        # Circuit Breaker quedaba abierto, devolviendo analítica vacía.
        - name: CIRCLEGUARD_PROMOTION_SERVICE_URL
          value: "http://circleguard-promotion-service:80"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_dashboard?sslmode=disable"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: DB_PASSWORD
        - name: MANAGEMENT_HEALTH_DATASOURCE_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_LDAP_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_MAIL_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "none"
        - name: SPRING_FLYWAY_ENABLED
          value: "false"
        - name: SPRING_KAFKA_LISTENER_AUTO_STARTUP
          value: "false"
        - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
          value: "0"
        - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
          value: "3"
        - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-dashboard-service
  namespace: production
spec:
  selector:
    app: circleguard-dashboard-service
  type: NodePort
  ports:
  - port: 80
    targetPort: 8084
