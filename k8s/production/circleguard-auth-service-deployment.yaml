apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-auth-service
  namespace: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: circleguard-auth-service
  template:
    metadata:
      labels:
        app: circleguard-auth-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-auth-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8180
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8180
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 5
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_auth"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: DB_PASSWORD
        - name: SPRING_LDAP_URLS
          value: "ldap://circleguard-ldap.dev.svc.cluster.local:389"
        - name: SPRING_LDAP_BASE
          value: "dc=circleguard,dc=edu"
        - name: SPRING_LDAP_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: LDAP_USERNAME
        - name: SPRING_LDAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: LDAP_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: JWT_SECRET
        - name: QR_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-production-secrets
              key: QR_SECRET
        - name: IDENTITY_SERVICE_URL
          value: "http://circleguard-identity-service"
        - name: MANAGEMENT_HEALTH_DATASOURCE_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_LDAP_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_MAIL_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
          value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-auth-service
  namespace: production
spec:
  selector:
    app: circleguard-auth-service
  type: NodePort
  ports:
  - port: 80
    targetPort: 8180
