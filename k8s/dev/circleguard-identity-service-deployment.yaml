apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-identity-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-identity-service
  template:
    metadata:
      labels:
        app: circleguard-identity-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-identity-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-identity-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8083
        readinessProbe:
          tcpSocket:
            port: 8083
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 12
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_identity?sslmode=disable"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "supersecretpassword"
        - name: JWT_SECRET
          value: "my-super-secret-dev-key-32-chars-long-12345678"
        - name: MANAGEMENT_HEALTH_DATASOURCE_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "none"
        - name: SPRING_FLYWAY_ENABLED
          value: "false"
        - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
          value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-identity-service
  namespace: dev
spec:
  selector:
    app: circleguard-identity-service
  ports:
  - port: 80
    targetPort: 8083
