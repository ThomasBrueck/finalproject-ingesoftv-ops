apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-dev-data
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-dev
  namespace: dev
  labels:
    app: neo4j-dev
spec:
  replicas: 1
  # Recreate: con PVC ReadWriteOnce un RollingUpdate genera Multi-Attach
  # (el pod nuevo no puede montar el volumen mientras el viejo vive).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j-dev
  template:
    metadata:
      labels:
        app: neo4j-dev
    spec:
      # Sin esto K8s inyecta NEO4J_DEV_SERVICE_PORT (service link del Service
      # "neo4j-dev") y Neo4j 5 la parsea como setting "DEV.SERVICE.PORT" →
      # "Unrecognized setting" → crash loop con strict validation.
      enableServiceLinks: false
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
          # Neo4j CE first-boot initialises the database: ~90-180s on AKS.
          # readinessProbe: window = 30 + (30 * 10) = 330s — covers first boot.
          # livenessProbe: only fires after 360s so the pod is never killed while
          # Neo4j is still initialising.
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 360
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-dev-data
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-dev
  namespace: dev
spec:
  selector:
    app: neo4j-dev
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
