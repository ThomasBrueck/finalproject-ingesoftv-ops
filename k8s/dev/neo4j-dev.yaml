apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-dev-data
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-dev
  namespace: dev
  labels:
    app: neo4j-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-dev
  template:
    metadata:
      labels:
        app: neo4j-dev
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
            - name: NEO4J_PLUGINS
              value: "[]"
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-dev-data
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-dev
  namespace: dev
spec:
  selector:
    app: neo4j-dev
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
