apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-promotion-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-promotion-service
  template:
    metadata:
      labels:
        app: circleguard-promotion-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-promotion-service
        image: circleguardacr.azurecr.io/circle-guard/circleguard-promotion-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8088
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_promotion"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: SPRING_NEO4J_URI
          value: "bolt://neo4j-dev.dev.svc.cluster.local:7687"
        - name: SPRING_NEO4J_AUTHENTICATION_USERNAME
          value: "neo4j"
        - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
          value: "password"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-dev.dev.svc.cluster.local:9092"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-dev-master.dev.svc.cluster.local"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: JWT_SECRET
          value: "my-super-secret-dev-key-32-chars-long-12345678"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-promotion-service
  namespace: dev
spec:
  selector:
    app: circleguard-promotion-service
  ports:
  - port: 80
    targetPort: 8088
