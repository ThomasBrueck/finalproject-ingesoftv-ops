apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-auth-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-auth-service
  template:
    metadata:
      labels:
        app: circleguard-auth-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-auth-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8180
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 12
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_auth"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "supersecretpassword"
        - name: SPRING_LDAP_URLS
          value: "ldap://circleguard-ldap.dev.svc.cluster.local:389"
        - name: SPRING_LDAP_BASE
          value: "dc=circleguard,dc=edu"
        - name: SPRING_LDAP_USERNAME
          value: "cn=admin,dc=circleguard,dc=edu"
        - name: SPRING_LDAP_PASSWORD
          value: "admin"
        - name: MANAGEMENT_HEALTH_LDAP_ENABLED
          value: "false"
        - name: JWT_SECRET
          value: "my-super-secret-dev-key-32-chars-long-12345678"
        - name: QR_SECRET
          value: "my-qr-secret-key-for-dev-1234567890"
        - name: IDENTITY_SERVICE_URL
          value: "http://circleguard-identity-service"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-auth-service
  namespace: dev
spec:
  selector:
    app: circleguard-auth-service
  ports:
  - port: 80
    targetPort: 8180
