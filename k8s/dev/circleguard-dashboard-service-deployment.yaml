apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-dashboard-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-dashboard-service
  template:
    metadata:
      labels:
        app: circleguard-dashboard-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-dashboard-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-dashboard-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8084
        readinessProbe:
          tcpSocket:
            port: 8084
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 12
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_dashboard"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "supersecretpassword"
        - name: MANAGEMENT_HEALTH_DATASOURCE_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
          value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-dashboard-service
  namespace: dev
spec:
  selector:
    app: circleguard-dashboard-service
  ports:
  - port: 80
    targetPort: 8084
