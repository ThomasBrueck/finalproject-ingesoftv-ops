apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-form-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-form-service
  template:
    metadata:
      labels:
        app: circleguard-form-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-form-service
        image: circleguardacr.azurecr.io/circle-guard/circleguard-form-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8086
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_form"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-dev.dev.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-form-service
  namespace: dev
spec:
  selector:
    app: circleguard-form-service
  ports:
  - port: 80
    targetPort: 8086
