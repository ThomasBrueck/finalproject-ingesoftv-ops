apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-gateway-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-gateway-service
  template:
    metadata:
      labels:
        app: circleguard-gateway-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-gateway-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-gateway-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8087
        readinessProbe:
          tcpSocket:
            port: 8087
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 12
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-dev-master.dev.svc.cluster.local"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: JWT_SECRET
          value: "my-super-secret-dev-key-32-chars-long-12345678"
        - name: QR_SECRET
          value: "my-qr-secret-key-for-dev-1234567890"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-gateway-service
  namespace: dev
spec:
  selector:
    app: circleguard-gateway-service
  ports:
  - port: 80
    targetPort: 8087
  type: NodePort
