apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-dev-master
  namespace: dev
  labels:
    app: redis-dev-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-dev-master
  template:
    metadata:
      labels:
        app: redis-dev-master
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "5m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: redis-dev-master
  namespace: dev
spec:
  selector:
    app: redis-dev-master
  ports:
    - port: 6379
      targetPort: 6379
