apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-auth-service
  namespace: stage
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: circleguard-auth-service
  template:
    metadata:
      labels:
        app: circleguard-auth-service
    spec:
      # Sin service links: K8s inyecta env vars <SERVICE>_PORT=tcp://... por cada
      # Service del namespace (p.ej. LOGSTASH_PORT) que colisionan con la
      # configuracion de la app (logback, Spring relaxed binding).
      enableServiceLinks: false
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-auth-service
        image: circleguardacrcore.azurecr.io/circle-guard/circleguard-auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8180
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8180
          initialDelaySeconds: 90
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8180
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 5
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "staging"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_auth?sslmode=disable"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: DB_PASSWORD
        - name: SPRING_LDAP_URLS
          value: "ldap://circleguard-ldap.dev.svc.cluster.local:389"
        - name: SPRING_LDAP_BASE
          value: "dc=circleguard,dc=edu"
        - name: SPRING_LDAP_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: LDAP_USERNAME
        - name: SPRING_LDAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: LDAP_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: JWT_SECRET
        - name: QR_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: QR_SECRET
        - name: IDENTITY_SERVICE_URL
          value: "http://circleguard-identity-service"
        - name: MANAGEMENT_HEALTH_DATASOURCE_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_LDAP_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_MAIL_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        - name: SPRING_FLYWAY_ENABLED
          value: "false"
        - name: SPRING_KAFKA_LISTENER_AUTO_STARTUP
          value: "false"
        - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
          value: "0"
        - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
          value: "3"
        - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-auth-service
  namespace: stage
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8180"
spec:
  selector:
    app: circleguard-auth-service
  type: NodePort
  ports:
  - port: 80
    targetPort: 8180
