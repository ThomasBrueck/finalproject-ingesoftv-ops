apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-gateway-service
  namespace: stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: circleguard-gateway-service
  template:
    metadata:
      labels:
        app: circleguard-gateway-service
    spec:
      containers:
      - name: circleguard-gateway-service
        image: circle-guard/circleguard-gateway-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8087
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8087
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8087
          initialDelaySeconds: 60
          periodSeconds: 15
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "staging"
        - name: SPRING_DATA_REDIS_HOST
          value: "host.minikube.internal"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: JWT_SECRET
        - name: QR_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: QR_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-gateway-service
  namespace: stage
spec:
  selector:
    app: circleguard-gateway-service
  type: NodePort
  ports:
  - port: 80
    targetPort: 8087
