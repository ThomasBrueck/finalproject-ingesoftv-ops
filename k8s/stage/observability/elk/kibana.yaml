apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: stage
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.13.4
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch:9200"
        # Heap de Node por defecto excede 512Mi → exit 134 (V8 OOM, SIGABRT).
        - name: NODE_OPTIONS
          value: "--max-old-space-size=700"
        ports:
        - containerPort: 5601
          name: web
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: stage
spec:
  selector:
    app: kibana
  ports:
  - port: 5601
    targetPort: 5601
