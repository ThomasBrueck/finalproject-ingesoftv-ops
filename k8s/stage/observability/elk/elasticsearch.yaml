apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: stage
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
        ports:
        - containerPort: 9200
          name: db
        - containerPort: 9300
          name: transport
        resources:
          # ES 8 con heap 256m necesita >512Mi totales (off-heap + JVM):
          # con limit 512Mi el kernel lo mata (OOMKilled, exit 137).
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: stage
spec:
  selector:
    app: elasticsearch
  ports:
  - port: 9200
    targetPort: 9200
