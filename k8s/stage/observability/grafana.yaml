              },
              "unit": "reqps"
            }
          },
          "targets": [
            {
              "expr": "sum by (status) (rate(http_server_requests_seconds_count{kubernetes_service_name=\"circleguard-auth-service\"}[1m]))",
              "legendFormat": "{{status}}"
            }
