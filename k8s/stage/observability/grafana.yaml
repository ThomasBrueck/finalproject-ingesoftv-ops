                    "value": null
                  }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(http_server_requests_seconds_count{kubernetes_service_name=\"circleguard-auth-service\"}[5m]))",
              "legendFormat": "Peticiones HTTP (5m)"
