                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(http_server_requests_seconds_count{kubernetes_service_name=\"circleguard-auth-service\", status=~\"5..\"}[5m]))",
              "legendFormat": "Errores 5xx (5m)"
            }
          ]
        },
        {
          "id": 20,
          "type": "row",
          "title": "Tráfico HTTP",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 6
