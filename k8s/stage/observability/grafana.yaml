          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 25
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(circleguard_auth_login_success_total[1m]))",
              "legendFormat": "Exitosos"
            },
            {
              "expr": "sum(increase(circleguard_auth_login_failed_total[1m]))",
              "legendFormat": "Fallidos"
            }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": [
        "circleguard",
        "per-service",
        "auth"
      ],
