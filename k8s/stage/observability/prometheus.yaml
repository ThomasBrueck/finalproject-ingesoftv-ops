apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: stage
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - "/etc/prometheus-rules/alert-rules.yaml"

    scrape_configs:
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - stage
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: kubernetes_service_name
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: stage
data:
  alert-rules.yaml: |
    groups:
      - name: circleguard-alerts
        rules:
        - alert: InstanceDown
          expr: up{job="kubernetes-service-endpoints"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Instance {{ $labels.kubernetes_service_name }} is down"
            description: "Instance {{ $labels.kubernetes_service_name }} has been down for more than 30s."
        - alert: HighHttp5xxErrorRate
          expr: sum by (kubernetes_service_name) (rate(http_server_requests_seconds_count{status=~"5.."}[1m])) / sum by (kubernetes_service_name) (rate(http_server_requests_seconds_count[1m])) > 0.05
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate on {{ $labels.kubernetes_service_name }}"
            description: "5xx HTTP responses exceed 5% of total requests on {{ $labels.kubernetes_service_name }}."
        - alert: HighJvmHeapUsage
          expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High JVM heap usage on {{ $labels.kubernetes_service_name }}"
            description: "JVM Heap usage is above 85% of max capacity on {{ $labels.kubernetes_service_name }}."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: storage-volume
              mountPath: /prometheus
            - name: rules-volume
              mountPath: /etc/prometheus-rules
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
        - name: rules-volume
          configMap:
            name: prometheus-rules
        - name: storage-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: stage
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: stage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-role
  namespace: stage
  labels:
    app: prometheus
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-role-binding
  namespace: stage
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-role
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: stage
