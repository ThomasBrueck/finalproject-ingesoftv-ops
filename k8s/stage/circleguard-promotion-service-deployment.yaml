apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-promotion-service
  namespace: stage
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: circleguard-promotion-service
  template:
    metadata:
      labels:
        app: circleguard-promotion-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: circleguard-promotion-service
        image: circleguardacr.azurecr.io/circle-guard/circleguard-promotion-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8088
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8088
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 5
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "staging"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-dev-postgresql.dev.svc.cluster.local:5432/circleguard_promotion"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: DB_PASSWORD
        - name: SPRING_NEO4J_URI
          value: "bolt://neo4j-dev.dev.svc.cluster.local:7687"
        - name: SPRING_NEO4J_AUTHENTICATION_USERNAME
          value: "neo4j"
        - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
          value: "password"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-dev.dev.svc.cluster.local:9092"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-dev-master.dev.svc.cluster.local"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-stage-secrets
              key: JWT_SECRET
        - name: MANAGEMENT_HEALTH_DATASOURCE_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_LDAP_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_NEO4J_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_DISKSPACE_ENABLED
          value: "false"
        - name: SPRING_MAIN_LAZY_INITIALIZATION
          value: "true"
        - name: SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL
          value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-promotion-service
  namespace: stage
spec:
  selector:
    app: circleguard-promotion-service
  type: NodePort
  ports:
  - port: 80
    targetPort: 8088
