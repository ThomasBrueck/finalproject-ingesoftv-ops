version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: circleguard-e2e-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: circleguard
    ports:
      - "5433:5432"
    volumes:
      - e2e-pgdata:/var/lib/postgresql/data
      - ${DEV_REPO_PATH:-../../../finalproject-ingesoftv-dev}/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d circleguard_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: circleguard-e2e-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: circleguard-e2e-kafka
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2
    container_name: circleguard-e2e-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  openldap:
    image: osixia/openldap:1.5.0
    container_name: circleguard-e2e-ldap
    ports:
      - "3389:389"
      - "6636:636"
    environment:
      LDAP_ORGANISATION: "CircleGuard"
      LDAP_DOMAIN: "circleguard.edu"
      LDAP_ADMIN_PASSWORD: "admin"

  auth-service:
    build:
      context: ${DEV_REPO_PATH:-../../../finalproject-ingesoftv-dev}
      dockerfile: services/circleguard-auth-service/Dockerfile
    image: circleguard/e2e/auth-service:latest
    container_name: circleguard-e2e-auth
    ports:
      - "8180:8180"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_auth
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_LDAP_URLS: ldap://openldap:389
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8180/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 15

  gateway-service:
    build:
      context: ${DEV_REPO_PATH:-../../../finalproject-ingesoftv-dev}
      dockerfile: services/circleguard-gateway-service/Dockerfile
    image: circleguard/e2e/gateway-service:latest
    container_name: circleguard-e2e-gateway
    ports:
      - "8087:8087"
    environment:
      SPRING_REDIS_HOST: redis
      AUTH_SERVICE_URL: http://auth-service:8180
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  e2e-pgdata:
