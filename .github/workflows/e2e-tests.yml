name: E2E Tests

on:
  push:
    branches: [master, fix/test-ports-pipeline]
  pull_request:
    branches: [master, fix/test-ports-pipeline]
  workflow_dispatch:
    inputs:
      dev-branch:
        description: 'Branch of the dev repo to test'
        required: false
        default: master
  repository_dispatch:
    types: [run-e2e-tests]

env:
  DEV_REPO: ThomasBrueck/finalproject-ingesoftv-dev
  K8S_NAMESPACE: stage

jobs:
  test-suite:
    name: Complete Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4

      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEV_REPO }}
          ref: ${{ github.event.inputs.dev-branch || github.event.client_payload.dev_branch || github.head_ref || github.ref_name }}
          token: ${{ secrets.DEV_REPO_TOKEN }}
          path: app

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build service images
        run: |
          cd app/e2e
          export DEV_REPO_PATH=${{ github.workspace }}/app
          docker compose -f docker-compose-e2e.yml build --parallel

      - name: Start services
        run: |
          cd app/e2e
          export DEV_REPO_PATH=${{ github.workspace }}/app
          docker compose -f docker-compose-e2e.yml up -d --wait

      # Phase 1: E2E Tests
      - name: Run E2E tests
        run: |
          cd app/e2e
          export AUTH_SERVICE_URL=http://localhost:8180
          export IDENTITY_SERVICE_URL=http://localhost:8083
          export PROMOTION_SERVICE_URL=http://localhost:8088
          export NOTIFICATION_SERVICE_URL=http://localhost:8082
          export FORM_SERVICE_URL=http://localhost:8086
          export GATEWAY_SERVICE_URL=http://localhost:8087
          export DASHBOARD_SERVICE_URL=http://localhost:8084
          export FILE_SERVICE_URL=http://localhost:8085
          ./gradlew test --no-daemon

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_id }}
          path: app/e2e/build/reports/

      # Phase 2: Performance Tests (Locust)
      - name: Run Locust performance tests
        if: success()
        run: |
          chmod +x app/tests/performance/run-locust.sh
          app/tests/performance/run-locust.sh light

      - name: Upload Locust reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results-${{ github.run_id }}
          path: app/tests/performance/build/reports/

      # Phase 3: Security Tests (OWASP ZAP)
      - name: Run OWASP ZAP security scan
        if: success()
        run: |
          chmod +x app/tests/security/zap-scan.sh
          app/tests/security/zap-scan.sh http://localhost:8083

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results-${{ github.run_id }}
          path: app/tests/security/build/reports/

      # Phase 4: HPA Verification (only in K8s environment with kubectl)
      - name: Verify HPA auto-scaling
        if: success()
        run: |
          if command -v kubectl &> /dev/null; then
            chmod +x tests/hpa-verify.sh
            ./tests/hpa-verify.sh ${{ env.K8S_NAMESPACE }} 2
          else
            echo "Skipping HPA verification: kubectl not found (non-K8s environment)"
          fi
        continue-on-error: true

      - name: Upload HPA verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hpa-results-${{ github.run_id }}
          path: tests/build/reports/hpa/

      # Phase 5: Consolidated Report
      - name: Generate consolidated quality report
        if: always()
        run: |
          chmod +x app/tests/consolidate-report.sh
          app/tests/consolidate-report.sh
        continue-on-error: true

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-report-${{ github.run_id }}
          path: app/tests/build/reports/consolidated/

      # Collect logs on failure
      - name: Collect logs on failure
        if: failure()
        run: |
          cd app/e2e
          mkdir -p build/reports/logs
          docker compose -f docker-compose-e2e.yml logs --tail=200 > build/reports/logs/service-logs.txt
          docker compose -f docker-compose-e2e.yml ps >> build/reports/logs/service-ps.txt

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: app/e2e/build/reports/logs/

      # Cleanup
      - name: Stop containers
        if: always()
        run: |
          cd app/e2e
          docker compose -f docker-compose-e2e.yml down -v
