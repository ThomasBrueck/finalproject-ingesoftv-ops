name: E2E Tests

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dev-branch:
        description: 'Branch of the dev repo to test'
        required: false
        default: master
  repository_dispatch:
    types: [run-e2e-tests]

env:
  DEV_REPO: ThomasBrueck/finalproject-ingesoftv-dev

jobs:
  test-suite:
    name: Complete Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4

      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEV_REPO }}
          ref: ${{ github.event.inputs.dev-branch || github.event.client_payload.dev_branch || 'master' }}
          token: ${{ secrets.DEV_REPO_TOKEN }}
          path: app

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build service images
        run: |
          cd tests/e2e
          export DEV_REPO_PATH=${{ github.workspace }}/app
          docker compose build --parallel

      - name: Start services
        run: |
          cd tests/e2e
          export DEV_REPO_PATH=${{ github.workspace }}/app
          docker compose up -d --wait

      # ── Phase 1: E2E Tests ──────────────────────────────
      - name: Run E2E tests
        run: |
          cd tests/e2e
          export AUTH_SERVICE_URL=http://localhost:8180
          export IDENTITY_SERVICE_URL=http://localhost:8083
          export PROMOTION_SERVICE_URL=http://localhost:8088
          export NOTIFICATION_SERVICE_URL=http://localhost:8082
          export FORM_SERVICE_URL=http://localhost:8086
          export GATEWAY_SERVICE_URL=http://localhost:8087
          export DASHBOARD_SERVICE_URL=http://localhost:8084
          export FILE_SERVICE_URL=http://localhost:8085
          ./gradlew test --no-daemon

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_id }}
          path: tests/e2e/build/reports/

      # ── Phase 2: Performance Tests (Locust) ────────────
      - name: Run Locust performance tests
        if: success()
        run: |
          chmod +x tests/performance/run-locust.sh
          ./tests/performance/run-locust.sh http://localhost:8080 10 2 60s

      - name: Upload Locust reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results-${{ github.run_id }}
          path: tests/performance/build/reports/

      # ── Phase 3: Security Tests (OWASP ZAP) ────────────
      - name: Run OWASP ZAP security scan
        if: success()
        run: |
          chmod +x tests/security/zap-scan.sh
          ./tests/security/zap-scan.sh http://localhost:8083

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results-${{ github.run_id }}
          path: tests/security/build/reports/

      # ── Collect logs on failure ─────────────────────────
      - name: Collect logs on failure
        if: failure()
        run: |
          cd tests/e2e
          mkdir -p build/reports/logs
          docker compose logs --tail=200 > build/reports/logs/service-logs.txt
          docker compose ps >> build/reports/logs/service-ps.txt

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: tests/e2e/build/reports/logs/

      # ── Cleanup ──────────────────────────────────────
      - name: Stop containers
        if: always()
        run: |
          cd tests/e2e
          docker compose down -v
