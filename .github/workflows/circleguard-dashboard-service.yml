name: "CI/CD — circleguard-dashboard-service"

on:
  workflow_dispatch:
    inputs:
      dev-branch:
        description: 'Branch del repo de desarrollo a construir'
        required: false
        default: master

jobs:
  pipeline:
    uses: ./.github/workflows/_cicd-pipeline.yml
    with:
      service-name: circleguard-dashboard-service
      service-port: '8084'
      dev-branch: ${{ inputs.dev-branch || 'master' }}
    secrets: inherit
