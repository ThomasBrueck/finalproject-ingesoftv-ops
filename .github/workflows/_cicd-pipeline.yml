# ==============================================================================
# CircleGuard — Pipeline CI/CD Reutilizable
#
# Uso: cada servicio tiene su propio workflow que llama este con sus parámetros.
#
# Secrets requeridos (configurar en GitHub → Settings → Secrets):
#   AZURE_CREDENTIALS   — JSON del Service Principal de Azure
#   ACR_USERNAME        — Usuario del ACR (o 'service-principal')
#   ACR_PASSWORD        — Contraseña del ACR
#   SONAR_TOKEN         — Token de SonarCloud
#   DEV_REPO_TOKEN      — GitHub PAT con acceso al repo de desarrollo (si es privado)
#
# Variables requeridas (GitHub → Settings → Variables):
#   DEV_REPO            — ej. TuOrg/finalproject-ingesoftv
#   SONAR_ORGANIZATION  — slug de tu organización en sonarcloud.io
#
# GitHub Environments a crear (Settings → Environments):
#   dev        — sin protección (deploy automático)
#   stage      — sin protección (deploy automático)
#   production — Required reviewers: tech-lead (deploy manual = CD CA2)
# ==============================================================================

name: CI/CD Pipeline (reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Nombre del microservicio (e.g. circleguard-auth-service)'
        required: true
        type: string
      dev-branch:
        description: 'Branch del repo de desarrollo a construir'
        required: false
        type: string
        default: master
      run-cd:
        description: 'Ejecutar deploy (false en PRs, true en push a master)'
        required: false
        type: boolean
        default: true
    secrets:
      AZURE_CREDENTIALS:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: true
      DEV_REPO_TOKEN:
        required: true

env:
  ACR_REGISTRY: circleguardacrcore.azurecr.io
  IMAGE_PREFIX: circle-guard
  AKS_CLUSTER: circleguard-aks
  AKS_RG: circleguard-core-rg

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI — Build · Unit Tests · SonarCloud (CA1 + CA2) · Trivy · Push ACR
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: CI — Build & Scan
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}

    steps:
      - name: Checkout ops repo (manifests k8s)
        uses: actions/checkout@v4
        with:
          repository: ThomasBrueck/finalproject-ingesoftv-ops
          ref: master

      - name: Checkout dev repo (código fuente)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEV_REPO }}
          ref: ${{ inputs.dev-branch }}
          token: ${{ secrets.DEV_REPO_TOKEN }}
          path: app
          fetch-depth: 0

      # CD CA: Versionado semántico automático (SCRUM-33)
      # Calcula vMAJOR.MINOR.PATCH desde los Conventional Commits del servicio.
      - name: Compute semantic version
        id: semver
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          APP_DIR: app
        run: bash scripts/compute-semver.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Compile all services
        working-directory: app
        run: ./gradlew classes --no-daemon

      # Run every module's tests so JaCoCo reports exist for all services before
      # the SonarCloud analysis (which scans the whole project). Otherwise Sonar
      # only sees the triggering service's coverage and reports the rest as 0%.
      - name: Unit Tests (all modules)
        working-directory: app
        run: ./gradlew test --no-daemon

      - name: Coverage Verification (>= 70%)
        working-directory: app
        run: ./gradlew :services:${{ inputs.service-name }}:jacocoTestCoverageVerification --no-daemon

      # NOTA: el análisis de SonarCloud (CA1 + CA2) corre en un workflow dedicado
      # del repo dev (.github/workflows/sonarcloud.yml), UNA sola vez por commit.
      # No se hace aquí porque los 8 pipelines por-servicio analizarían el mismo
      # project key y commit en paralelo y SonarCloud rechaza reportes duplicados.

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ inputs.service-name }}-${{ github.run_id }}
          path: app/services/${{ inputs.service-name }}/build/reports/jacoco/

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/services/${{ inputs.service-name }}/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.service-name }}:v${{ steps.semver.outputs.version }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.service-name }}:latest

      # CI CA1: Trivy bloquea si hay vulnerabilidades CRITICAL o HIGH sin fix
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.service-name }}:v${{ steps.semver.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: ${{ github.workspace }}/.trivyignore

  # ─────────────────────────────────────────────────────────────────────────────
  # CD DEV — automático (CD CA1 + CD CA3: namespace dev)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → DEV
    needs: ci
    if: inputs.run-cd
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4
        with:
          repository: ThomasBrueck/finalproject-ingesoftv-ops
          ref: master

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Deploy to DEV namespace
        run: |
          kubectl apply -f k8s/dev/00-namespace.yaml
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ env.ACR_REGISTRY }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            -n dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/dev/postgres-dev-postgresql.yaml
          kubectl apply -f k8s/dev/circleguard-ldap-deployment.yaml
          kubectl apply -f k8s/dev/redis-dev.yaml
          kubectl apply -f k8s/dev/neo4j-dev.yaml
          kubectl rollout status deployment/postgres-dev-postgresql -n dev --timeout=180s
          kubectl rollout status deployment/circleguard-ldap -n dev --timeout=120s
          kubectl rollout status deployment/redis-dev-master -n dev --timeout=60s
          kubectl rollout status deployment/neo4j-dev -n dev --timeout=600s
          kubectl delete deployment ${{ inputs.service-name }} -n dev --ignore-not-found=true
          kubectl wait --for=delete deployment/${{ inputs.service-name }} -n dev --timeout=60s 2>/dev/null || true
          kubectl apply -f k8s/dev/${{ inputs.service-name }}-deployment.yaml
          kubectl rollout status deployment/${{ inputs.service-name }} -n dev --timeout=300s || \
            (echo "=== POD DESCRIBE ===" && kubectl describe pod -l app=${{ inputs.service-name }} -n dev && \
             echo "=== POD LOGS ===" && kubectl logs -l app=${{ inputs.service-name }} -n dev --previous --tail=100 2>/dev/null; kubectl logs -l app=${{ inputs.service-name }} -n dev --tail=100 2>/dev/null || true && \
             exit 1)
          echo "=== Deploying Observability Stack ==="
          kubectl apply -f k8s/stage/observability/ -R
          kubectl rollout status deployment/prometheus -n stage --timeout=120s || true
          kubectl rollout status deployment/grafana -n stage --timeout=120s || true
          kubectl rollout status deployment/elasticsearch -n stage --timeout=120s || true
          kubectl rollout status deployment/logstash -n stage --timeout=120s || true
          kubectl rollout status deployment/kibana -n stage --timeout=120s || true
          kubectl rollout status deployment/jaeger -n stage --timeout=120s || true
          kubectl rollout status deployment/alertmanager -n stage --timeout=120s || true

  # ─────────────────────────────────────────────────────────────────────────────
  # CD STAGE — automático después de DEV (CD CA1 + CD CA3: namespace stage)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-stage:
    name: Deploy → STAGE
    needs: [ci, deploy-dev]
    if: inputs.run-cd
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4
        with:
          repository: ThomasBrueck/finalproject-ingesoftv-ops
          ref: master

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Deploy to STAGE namespace
        run: |
          kubectl apply -f k8s/stage/00-namespace.yaml
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ env.ACR_REGISTRY }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            -n stage --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic circleguard-stage-secrets \
            --from-literal=DB_USERNAME=postgres \
            --from-literal=DB_PASSWORD=supersecretpassword \
            --from-literal=LDAP_USERNAME="cn=admin,dc=circleguard,dc=edu" \
            --from-literal=LDAP_PASSWORD=admin \
            --from-literal=JWT_SECRET="stage-jwt-secret-key-32-chars-long-1234" \
            --from-literal=QR_SECRET="stage-qr-secret-key-32-chars-long-12345" \
            -n stage --dry-run=client -o yaml | kubectl apply -f -
          kubectl delete deployment ${{ inputs.service-name }} -n stage --ignore-not-found=true
          kubectl wait --for=delete deployment/${{ inputs.service-name }} -n stage --timeout=60s 2>/dev/null || true
          kubectl apply -f k8s/stage/${{ inputs.service-name }}-deployment.yaml
          kubectl rollout status deployment/${{ inputs.service-name }} -n stage --timeout=300s || \
            (echo "=== POD DESCRIBE ===" && kubectl describe pod -l app=${{ inputs.service-name }} -n stage && \
             echo "=== POD LOGS ===" && kubectl logs -l app=${{ inputs.service-name }} -n stage --previous --tail=100 2>/dev/null; kubectl logs -l app=${{ inputs.service-name }} -n stage --tail=100 2>/dev/null || true && \
             exit 1)
          echo "=== Deploying Observability Stack ==="
          kubectl apply -f k8s/stage/observability/ -R
          kubectl rollout status deployment/prometheus -n stage --timeout=120s || true
          kubectl rollout status deployment/grafana -n stage --timeout=120s || true
          kubectl rollout status deployment/elasticsearch -n stage --timeout=120s || true
          kubectl rollout status deployment/logstash -n stage --timeout=120s || true
          kubectl rollout status deployment/kibana -n stage --timeout=120s || true
          kubectl rollout status deployment/jaeger -n stage --timeout=120s || true
          kubectl rollout status deployment/alertmanager -n stage --timeout=120s || true

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — Full-stack tests contra Stage (bloqueante para PROD)
  #
  # Corre después del deploy a STAGE, verifica integración entre todos los
  # servicios usando port-forward al namespace stage en AKS.
  # Si falla → PROD no se despliega.
  # ─────────────────────────────────────────────────────────────────────────────
  run-e2e:
    name: E2E Tests (contra Stage)
    needs: [ci, deploy-stage]
    if: success() && inputs.run-cd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEV_REPO }}
          ref: ${{ inputs.dev-branch }}
          token: ${{ secrets.DEV_REPO_TOKEN }}
          path: app
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}
      - name: Run E2E tests (with port-forwards)
        env:
          AUTH_SERVICE_URL: http://localhost:8180
          IDENTITY_SERVICE_URL: http://localhost:8083
          PROMOTION_SERVICE_URL: http://localhost:8088
          NOTIFICATION_SERVICE_URL: http://localhost:8082
          FORM_SERVICE_URL: http://localhost:8086
          GATEWAY_SERVICE_URL: http://localhost:8087
          DASHBOARD_SERVICE_URL: http://localhost:8084
          FILE_SERVICE_URL: http://localhost:8085
        working-directory: app/e2e
        run: |
          echo "=== Starting Port-Forwards ==="
          mkdir -p /tmp/pf-logs
          kubectl port-forward -n stage service/circleguard-auth-service 8180:80 >/tmp/pf-logs/auth.log 2>&1 &
          echo $! > /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-identity-service 8083:80 >/tmp/pf-logs/identity.log 2>&1 &
          echo $! >> /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-promotion-service 8088:80 >/tmp/pf-logs/promotion.log 2>&1 &
          echo $! >> /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-notification-service 8082:80 >/tmp/pf-logs/notification.log 2>&1 &
          echo $! >> /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-form-service 8086:80 >/tmp/pf-logs/form.log 2>&1 &
          echo $! >> /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-gateway-service 8087:80 >/tmp/pf-logs/gateway.log 2>&1 &
          echo $! >> /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-dashboard-service 8084:80 >/tmp/pf-logs/dashboard.log 2>&1 &
          echo $! >> /tmp/pf.pids
          kubectl port-forward -n stage service/circleguard-file-service 8085:80 >/tmp/pf-logs/file.log 2>&1 &
          echo $! >> /tmp/pf.pids
          
          echo "Waiting for port-forward listeners to open..."
          sleep 5

          echo "=== Port-Forward Initialization Logs ==="
          for f in /tmp/pf-logs/*.log; do
            echo "--- $f ---"
            cat "$f"
          done

          # Active readiness gate: wait until every service returns HTTP 200 on
          # /actuator/health before running any test.
          # Checking / (root) was not enough: Tomcat binds and returns 404 early,
          # but with probes.enabled=true Spring Boot keeps /actuator/health at 503
          # (REFUSING_TRAFFIC) until the full application context is ready.
          # Tests calling /actuator/health or /actuator/prometheus were failing with
          # 503 / AssertionFailedError on slower services (identity, promotion,
          # form, gateway) that took >8s but <180s to fully start.
          echo "=== Waiting for all services to report healthy (HTTP 200) ==="
          PORTS="8180 8083 8088 8082 8086 8087 8084 8085"
          FAILED=0
          for port in $PORTS; do
            printf "localhost:%s /actuator/health ... " "$port"
            UP=0
            for i in $(seq 1 60); do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://localhost:$port/actuator/health" 2>/dev/null || echo 000)
              if [ "$CODE" = "200" ]; then
                echo "UP after $((i*3))s"
                UP=1
                break
              fi
              sleep 3
            done
            if [ "$UP" = "0" ]; then
              echo "NOT HEALTHY after 180s (last HTTP code: $CODE)"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more services did not become healthy within 180s."
            exit 1
          fi

          echo "=== Running E2E Tests ==="
          chmod +x gradlew
          
          set +e
          ./gradlew test --no-daemon
          TEST_EXIT_CODE=$?
          set -e
          
          echo "=== Cleaning up Port-Forwards ==="
          if [ -f /tmp/pf.pids ]; then
            xargs kill < /tmp/pf.pids 2>/dev/null || true
            rm /tmp/pf.pids
          fi
          
          exit $TEST_EXIT_CODE
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ inputs.service-name }}-${{ github.run_id }}
          path: app/e2e/build/reports/
      - name: Kill port-forwards
        if: always()
        run: |
          if [ -f /tmp/pf.pids ]; then
            xargs kill < /tmp/pf.pids 2>/dev/null || true
            rm /tmp/pf.pids
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # CD PROD — aprobación manual requerida (CD CA2 + CD CA3: namespace production)
  #
  # Configura el Environment "production" en:
  # GitHub → Settings → Environments → production → Required reviewers
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → PROD (aprobación manual)
    needs: [ci, run-e2e, deploy-stage]
    if: inputs.run-cd
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4
        with:
          repository: ThomasBrueck/finalproject-ingesoftv-ops
          ref: master

      - name: Checkout dev repo (para tag de versión)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEV_REPO }}
          ref: ${{ inputs.dev-branch }}
          token: ${{ secrets.DEV_REPO_TOKEN }}
          path: app
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Deploy to PRODUCTION namespace
        run: |
          kubectl apply -f k8s/production/00-namespace.yaml
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ env.ACR_REGISTRY }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            -n production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic circleguard-production-secrets \
            --from-literal=DB_USERNAME=postgres \
            --from-literal=DB_PASSWORD=supersecretpassword \
            --from-literal=LDAP_USERNAME="cn=admin,dc=circleguard,dc=edu" \
            --from-literal=LDAP_PASSWORD=admin \
            --from-literal=JWT_SECRET="prod-jwt-secret-key-32-chars-long-123456" \
            --from-literal=QR_SECRET="prod-qr-secret-key-32-chars-long-1234567" \
            -n production --dry-run=client -o yaml | kubectl apply -f -
          kubectl delete deployment ${{ inputs.service-name }} -n production --ignore-not-found=true
          kubectl wait --for=delete deployment/${{ inputs.service-name }} -n production --timeout=60s 2>/dev/null || true
          kubectl apply -f k8s/production/${{ inputs.service-name }}-deployment.yaml
          kubectl rollout status deployment/${{ inputs.service-name }} -n production --timeout=300s || \
            (echo "=== POD DESCRIBE ===" && kubectl describe pod -l app=${{ inputs.service-name }} -n production && \
             echo "=== POD LOGS ===" && kubectl logs -l app=${{ inputs.service-name }} -n production --previous --tail=100 2>/dev/null; kubectl logs -l app=${{ inputs.service-name }} -n production --tail=100 2>/dev/null || true && \
             exit 1)
          echo "=== Deploying Observability Stack ==="
          kubectl apply -f k8s/stage/observability/ -R
          kubectl rollout status deployment/prometheus -n stage --timeout=120s || true
          kubectl rollout status deployment/grafana -n stage --timeout=120s || true
          kubectl rollout status deployment/elasticsearch -n stage --timeout=120s || true
          kubectl rollout status deployment/logstash -n stage --timeout=120s || true
          kubectl rollout status deployment/kibana -n stage --timeout=120s || true
          kubectl rollout status deployment/jaeger -n stage --timeout=120s || true
          kubectl rollout status deployment/alertmanager -n stage --timeout=120s || true

      # CD CA: tag SemVer automático sobre el código desplegado (SCRUM-33)
      # Usa el GITHUB_TOKEN del run (con contents: write) para empujar el tag al
      # repo dev. No bloquea el deploy si el push falla: el despliegue a prod ya
      # fue exitoso en este punto.
      - name: Tag release (SemVer)
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.ci.outputs.version }}"
          TAG="${{ inputs.service-name }}/${VERSION}"
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "El tag $TAG ya existe; no se recrea."
            exit 0
          fi
          git tag -a "$TAG" -m "Release ${{ inputs.service-name }} ${VERSION} (deploy a producción)"
          if git push "https://x-access-token:${GH_TOKEN}@github.com/${{ vars.DEV_REPO }}.git" "$TAG"; then
            echo "Tag de release creado: $TAG"
          else
            echo "::warning::No se pudo crear el tag $TAG. El deploy a producción fue exitoso; revisa que el token tenga contents: write."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # NOTIFICACIÓN DE FALLOS (SCRUM-34)
  #
  # Si cualquier etapa (CI, DEV, STAGE, PROD) falla, abre/actualiza un GitHub
  # Issue con el detalle del fallo para que el equipo reaccione de inmediato.
  # No requiere infraestructura externa ni secrets: usa el GITHUB_TOKEN.
  #
  # Nota: requiere que los permisos de Actions del repo permitan escritura
  # (Settings → Actions → General → Workflow permissions → Read and write),
  # o que el workflow llamador conceda 'issues: write'.
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    needs: [ci, deploy-dev, run-e2e, deploy-stage, deploy-prod]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        env:
          SERVICE: ${{ inputs.service-name }}
          CI_RESULT: ${{ needs.ci.result }}
          DEV_RESULT: ${{ needs.deploy-dev.result }}
          E2E_RESULT: ${{ needs.run-e2e.result }}
          STAGE_RESULT: ${{ needs.deploy-stage.result }}
          PROD_RESULT: ${{ needs.deploy-prod.result }}
          DEV_BRANCH: ${{ inputs.dev-branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const service = process.env.SERVICE;
            const stages = {
              'CI — Build & Scan': process.env.CI_RESULT,
              'Deploy → DEV': process.env.DEV_RESULT,
              'E2E Tests (contra Stage)': process.env.E2E_RESULT,
              'Deploy → STAGE': process.env.STAGE_RESULT,
              'Deploy → PROD': process.env.PROD_RESULT,
            };
            const failed = Object.entries(stages)
              .filter(([, r]) => r === 'failure')
              .map(([name]) => name);

            const label = 'pipeline-failure';
            const title = `🔴 Pipeline falló: ${service}`;
            const body = [
              `**Servicio:** \`${service}\``,
              `**Etapas fallidas:** ${failed.length ? failed.join(', ') : '(ver run)'}`,
              `**Run:** ${process.env.RUN_URL}`,
              `**Branch dev:** \`${process.env.DEV_BRANCH}\``,
              `**Commit:** \`${context.sha}\``,
              `**Fecha:** ${new Date().toISOString()}`,
              '',
              `| Etapa | Resultado |`,
              `|---|---|`,
              ...Object.entries(stages).map(([n, r]) => `| ${n} | ${r || 'n/a'} |`),
            ].join('\n');

            const { owner, repo } = context.repo;
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 100,
            });
            const match = open.data.find(i => i.title === title);

            if (match) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: match.number,
                body: `### Nuevo fallo del pipeline\n\n${body}`,
              });
              core.notice(`Comentario agregado al issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: [label],
              });
              core.notice(`Issue de fallo creado: #${created.data.number}`);
            }
